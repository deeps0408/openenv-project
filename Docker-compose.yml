version: "3.9"

services:
  # ── Environment server ────────────────────────────────
  environment:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-support-env
    ports:
      - "7860:7860"
    environment:
      - API_BASE_URL=${API_BASE_URL:-https://api.openai.com/v1}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o-mini}
      - HF_TOKEN=${HF_TOKEN:-}
      - PORT=7860
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: on-failure

  # ── Baseline inference agent ──────────────────────────
  inference:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-support-inference
    depends_on:
      environment:
        condition: service_healthy
    environment:
      - API_BASE_URL=${API_BASE_URL:-https://api.openai.com/v1}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o-mini}
      - HF_TOKEN=${HF_TOKEN:-}
      - ENV_URL=http://environment:7860
    command: >
      sh -c "python inference.py --env-url http://environment:7860"
    restart: "no"